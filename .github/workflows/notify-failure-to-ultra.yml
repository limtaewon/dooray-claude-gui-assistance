name: Notify CI Failure to Ultra Agent

on:
  workflow_run:
    workflows: ["*"]
    types:
      - completed
  check_run:
    types:
      - completed

jobs:
  notify-failure:
    # 자기 자신이 실패해도 무한 루프 안 돌게 self-exclude
    if: >-
      (github.event.workflow_run.conclusion == 'failure' || github.event.check_run.conclusion == 'failure')
      && github.event.workflow_run.name != 'Notify CI Failure to Ultra Agent'
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification to Ultra Agent
        uses: actions/github-script@v7
        env:
          HOOK_URL: ${{ secrets.DOORAY_ULTRA_HOOK_URL }}
        with:
          script: |
            const hookUrl = process.env.HOOK_URL;
            if (!hookUrl) {
              core.setFailed('DOORAY_ULTRA_HOOK_URL secret 미설정');
              return;
            }

            const workflow = context.payload.workflow_run || context.payload.check_run;
            const repo = context.repo;

            const failureInfo = {
              type: context.payload.workflow_run ? 'workflow' : 'check_run',
              name: workflow.name || workflow.check_run?.name || '(unknown)',
              status: workflow.status,
              conclusion: workflow.conclusion,
              html_url: workflow.html_url,
              repository: `${repo.owner}/${repo.repo}`,
              branch: workflow.head_branch || context.ref,
              commit: (workflow.head_sha || context.sha || '').substring(0, 7),
            };

            const text = `CI 실패 — [${failureInfo.repository}] ${failureInfo.name} (${failureInfo.branch} @ ${failureInfo.commit})`;
            const detail = [
              `타입: ${failureInfo.type}`,
              `상태: ${failureInfo.status} → ${failureInfo.conclusion}`,
              `브랜치: ${failureInfo.branch}`,
              `커밋: ${failureInfo.commit}`,
              `링크: ${failureInfo.html_url}`,
            ].join('\n');
            const directive = `@ultra 위 CI 실패를 분석한 뒤, 원인이 명확하면 픽스 브랜치 따서 PR 올려주세요. (repo: ${failureInfo.repository})`;

            const payload = {
              botName: 'CI Failure',
              botIconImage: 'https://github.githubassets.com/favicons/favicon-failure.png',
              text,
              attachments: [
                { title: '실패 상세', text: detail, color: 'red' },
                { text: directive, color: 'green' },
              ],
            };

            console.log('POST payload:', JSON.stringify(payload, null, 2));

            const response = await fetch(hookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (response.ok) {
              console.log('✅ 알림 발송 성공');
            } else {
              const errText = await response.text();
              core.setFailed(`웹훅 발송 실패: ${response.status} ${errText}`);
            }
